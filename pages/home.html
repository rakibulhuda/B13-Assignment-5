<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="shortcut icon" href="../assets/github-logo.png" type="image/x-icon">
    <!-- Browser Icon -->
    <title>GitHub Issues Tracker</title>
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- Tailwind & Daisy CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
          integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
          crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Internal CSS  -->
    <link rel="stylesheet" href="../css/home.css">
</head>
<body class="bg-slate-100">

<!-- Navbar -->
<header>
    <nav class="navbar-wrapper">
        <div class="navbar-inner flex-col sm:flex-row gap-2 sm:gap-0 py-3 sm:py-0 h-auto sm:h-[75px]">
            <!-- Logo Section -->
            <div class="nav-logo">
                <a href="./home.html">
                    <img src="../assets/github-logo.png" class="w-7 h-7" alt="GitHub Logo" style="cursor: pointer;">
                </a>
                <span class="nav-title text-sm sm:text-[1.05rem]">GitHub Issues Tracker</span>
            </div>
            <!-- Searchbar -->
            <div class="nav-actions w-full sm:w-auto">
                <label class="search-box flex-1 sm:flex-none">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="search-icon-svg">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input type="search" id="searchInput" placeholder="Search issues..." autocomplete="off" class="w-full sm:w-[180px] lg:w-[240px]" />
                </label>
                <button class="new-issue-btn" id="newIssueBtn">
                    <i class="fa-solid fa-plus"></i> New Issue
                </button>
            </div>
        </div>
    </nav>
</header>

<!-- Main -->
<main>
    <section class="container mx-auto py-6 sm:py-10 px-4">
        <!-- Filter Tabs -->
        <div class="filter-card">
            <button class="tab-btn tab-active flex-1 sm:flex-none sm:w-[120px]" data-filter="all" id="allBtn">All</button>
            <button class="tab-btn flex-1 sm:flex-none sm:w-[120px]" data-filter="open" id="openBtn">Open</button>
            <button class="tab-btn flex-1 sm:flex-none sm:w-[120px]" data-filter="closed" id="closedBtn">Closed</button>
        </div>

        <!-- Issues Section -->
        <div class="issues-section">
            <!-- Issues Header -->
            <div class="issues-header flex-wrap gap-3">
                <div class="issues-header-left">
                    <div class="issues-aperture w-10 h-10 sm:w-[50px] sm:h-[50px]">
                        <img src="../assets/Aperture.png" alt="" class="w-[20px] h-[20px] sm:w-[28px] sm:h-[28px]">
                    </div>
                    <div>
                        <h2 id="issueCount" class="issues-count-text text-base sm:text-xl">0 Issues</h2>
                        <p class="issues-subtext text-xs sm:text-base">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="issues-legend">
                        <span class="legend-item text-xs sm:text-base">
                            <i class="fa-solid fa-circle text-green-500 text-xs"></i>
                            <span class="mb-0.5">Open</span>
                        </span>
                    <span class="legend-item text-xs sm:text-base">
                            <i class="fa-solid fa-circle text-purple-500 text-xs"></i>
                            <span class="mb-0.5">Closed</span>
                        </span>
                </div>
            </div>

            <!-- Loading Spinner -->
            <div id="loadingSpinner" class="loading-wrapper" style="display:none;">
                <span class="loading loading-spinner loading-lg text-success"></span>
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state" style="display:none;">
                <i class="fa-regular fa-circle-xmark text-4xl text-gray-300"></i>
                <p class="text-gray-400 mt-3">No issues found.</p>
            </div>

            <!-- Cards Grid -->
            <div id="issuesGrid" class="issues-grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
                <!-- Injected by JS -->
            </div>

        </div>
    </section>
</main>

<section>
    <!-- Issue Detail Panel -->
    <dialog id="issuePanel" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box panel-content-box p-5 sm:p-8">
            <!-- Title -->
            <h2 id="panelTitle" class="panel-title text-lg sm:text-2xl"></h2>

            <!-- Status Badge + Meta row -->
            <div class="panel-meta flex-wrap">
                <span id="panelStatusBadge" class="panel-status-badge"></span>
                <span class="panel-meta-dot">•</span>
                <span id="panelAuthor" class="panel-meta-text"></span>
                <span class="panel-meta-dot">•</span>
                <span id="panelDate" class="panel-meta-text"></span>
            </div>

            <!-- Labels -->
            <div id="panelLabels" class="panel-labels"></div>

            <!-- Description -->
            <p id="panelDescription" class="panel-description text-sm sm:text-base"></p>

            <!-- Info Panel -->
            <div class="panel-info-panel flex-wrap sm:flex-nowrap gap-8 sm:gap-[160px]">
                <div class="panel-item">
                    <p class="panel-item-label text-sm sm:text-base">Assignee:</p>
                    <p id="panelAssignee" class="panel-item-value text-sm sm:text-base"></p>
                </div>
                <div class="panel-item">
                    <p class="panel-item-label text-sm sm:text-base">Priority:</p>
                    <span id="panelPriority" class="priority-badge"></span>
                </div>
            </div>

            <!-- Close Button -->
            <div class="panel-close-row">
                <form method="dialog">
                    <button class="panel-close-btn">Close</button>
                </form>
            </div>

        </div>
        <!-- Backdrop click to close -->
        <form method="dialog" class="modal-backdrop"><button>close</button></form>
    </dialog>
</section>

<script src="../script/home.js"></script>
</body>
</html>
