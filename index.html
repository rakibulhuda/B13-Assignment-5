<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <!-- Browser Icon -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <title>Github Issue Tracker</title>
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- Internal CSS  -->
    <link rel="stylesheet" href="./css/style.css">
    <!-- Tailwind & Daisy CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
</head>
<body>
<section class="login-page">
    <div class="login-card w-full max-w-[95%] sm:max-w-[500px] px-5 py-7 sm:px-9 sm:py-10">

        <!-- Logo -->
        <div class="login-logo w-16 h-16 sm:w-20 sm:h-20">
            <img src="./assets/github-logo.png" alt="" srcset="">
        </div>

        <!-- Title & Subtitle -->
        <h1 class="login-title text-xl sm:text-2xl">GitHub Issues Tracker</h1>
        <p class="login-subtitle text-sm sm:text-base">Sign in to manage your issues</p>

        <!-- Username Field -->
        <div class="field-group">
            <label class="field-label text-sm sm:text-base" for="username">Username</label>
            <input type="text" id="username" class="login-input text-sm sm:text-base" placeholder="Enter Username" autocomplete="username" />
            <p class="hint-text text-xs sm:text-sm">Default: admin</p>
            <p class="error-msg" id="username-error">Please enter your username.</p>
        </div>

        <!-- Password Field -->
        <div class="field-group">
            <label class="field-label text-sm sm:text-base" for="password">Password</label>
            <input type="password" id="password" class="login-input text-sm sm:text-base" placeholder="Enter Password" autocomplete="current-password" />
            <p class="hint-text text-xs sm:text-sm">Default: admin123</p>
            <p class="error-msg" id="password-error">Please enter your password.</p>
        </div>

        <!-- Auth Error -->
        <p class="error-msg auth-error" id="auth-error">Invalid username or password.</p>

        <!-- Sign In Button -->
        <button class="sign-in-btn text-sm sm:text-base" id="sign-in-btn">Sign In</button>

        <!-- Divider -->
        <div class="divider">OR</div>

        <!-- Demo Credentials -->
        <div class="demo-box">
            <p class="demo-label text-xs sm:text-sm">Demo Credentials:</p>
            <div class="demo-credentials text-sm sm:text-base">
                <p><span>Username:</span> admin</p>
                <p><span>Password:</span> admin123</p>
            </div>
        </div>

    </div>
</section>
<script src="./script/main.js"></script>
</body>
</html>
